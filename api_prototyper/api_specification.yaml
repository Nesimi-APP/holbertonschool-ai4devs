openapi: 3.0.3
info:
  title: Inventory Management API
  description: A robust API for managing warehouse inventory, supporting JWT auth and pagination.
  version: 1.0.0
servers:
  - url: https://api.example-inventory.com/v1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Product:
      type: object
      required: [name, sku, quantity]
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
        sku:
          type: string
        quantity:
          type: integer
        price:
          type: number
          format: float
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string

security:
  - bearerAuth: []

paths:
  /products:
    get:
      summary: List all products
      description: Returns a paginated list of inventory items.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: A list of products.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '201':
          description: Product created successfully.
        '400':
          description: Invalid input.

  /products/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      summary: Get product details
      responses:
        '200':
          description: Successful retrieval.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found.
    put:
      summary: Update a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '200':
          description: Product updated.
    delete:
      summary: Remove a product
      responses:
        '204':
          description: Product deleted successfully.

components:
  responses:
    Unauthorized:
      description: JWT token is missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
